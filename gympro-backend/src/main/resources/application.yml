server:
  port: 8080

spring:
  application:
    name: gym-management-system

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gympro_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:2D4A614E645267556B58703273357638792F423F4428472B4B6250655368566D}
  expiration: 86400000

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:rzp_test_secret_placeholder}

# Optional CORS Configuration
cors:
  allowed-origins: "*"

# Swagger/OpenAPI (optional)
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
